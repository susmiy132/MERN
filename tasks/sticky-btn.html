<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticky Bottom Left Button</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 200vh;
            background: #f5f5f5;
        }

        /* Sample page content */
        .content {
            padding: 80px;
        }

        .content h1 {
            margin-bottom: 20px;
        }

        /* Sticky Button */
        .floating-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 50%;
            background: #25D366;
            color: white;
            font-size: 24px;
            cursor: pointer;
            z-index: 9999;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            transition: 0.3s;
        }

        .floating-btn:hover {
            transform: scale(1.08);
        }
    </style>

</head>

<body>

    <div class="content">
        <h1>Website Content</h1>
        <p>Scroll the page and the button will stay fixed at bottom left.</p>
    </div>

    <button class="floating-btn">
        ↑
    </button>

</body>

</html>
