<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Button</title>

    <style>
        body {
            background-color: aliceblue;
        }

        .container {
            margin: 2px;
        }

        h1 {
            color: black;
            font-weight: bold;
        }

        .sticky-btn {
            position: fixed;
            background-color: aliceblue;
            margin-left: 10px;
            bottom: 20px;
            border: 10px;
            width: 50px;
            height: 50px;
            border-radius: 20px;

        }

        .whatsapp-btn {
            height: 30px;
            width: 30px;
            border-radius: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>My Content</h1>
        <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Tempore porro laborum, ut illo, excepturi doloribus
            perferendis distinctio pariatur consequatur autem recusandae aliquid eligendi libero voluptatem dicta
            dignissimos rerum officiis suscipit.</p>
    </div>
    <button class="sticky-btn">
        <img class="whatsapp-btn" src="whatsapp.png" alt="whatsapp">
    </button>
</body>

</html>
