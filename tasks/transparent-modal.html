<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transparent Background Modal</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        body {
            background: #f4f4f4;
            min-height: 100vh;
            padding: 100px;
        }

        /* Open Button */
        .open-btn {
            padding: 14px 28px;
            border: none;
            background: #1677ff;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        /* Modal Background */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            /* transparent dark background */
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        /* Show modal */
        .modal.show {
            display: flex;
        }

        /* White Popup Box */
        .modal-box {
            width: 500px;
            background: white;
            border-radius: 12px;
            padding: 30px;
            position: relative;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        /* Close Button */
        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
        }

        /* Form */
        .modal-box h2 {
            margin-bottom: 20px;
        }

        .row {
            display: flex;
            gap: 15px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
        }

        .register-btn {
            width: 100%;
            padding: 14px;
            border: none;
            background: #1677ff;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>

</head>

<body>

    <button class="open-btn" onclick="openModal()">
        Open Modal
    </button>

    <div class="modal" id="modal">
        <div class="modal-box">
            <span class="close-btn" onclick="closeModal()">&times;</span>

            <h2>Authentication</h2>

            <div class="row">
                <input type="text" placeholder="First Name">
                <input type="text" placeholder="Last Name">
            </div>

            <input type="email" placeholder="Email">
            <input type="password" placeholder="Password">
            <input type="password" placeholder="Confirm Password">

            <button class="register-btn">
                Register
            </button>
        </div>
    </div>

    <script>
        function openModal() {
            document.getElementById("modal").classList.add("show");
        }

        function closeModal() {
            document.getElementById("modal").classList.remove("show");
        }
    </script>

</body>

</html>
