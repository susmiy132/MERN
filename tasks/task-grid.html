<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskImg</title>
    <style>
        header {
            justify-content: center;
        }

        .main-body {
            margin-left: 6rem;
            margin-top: 2.8rem;
            height: 40rem;
            width: 50rem;
            background-color: #eaeff1;
            border: 10px;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-screen {
            height: 32rem;
            width: 18rem;
            background-color: #ffffff;
            border: 10px;
            border-radius: 10px;
        }

        .small-img {
            margin: 5px;
            width: 278px;
            height: 200px;
            border-radius: 8px;
        }

        .btn {
            width: 3.5rem;
            color: #a7a7a7;
            border: 5px;
            border-radius: 10px;
            margin: 10px;
            border-color: black;
        }

        .main-section {
            margin-left: 10px;
        }

        .h1-section {
            font-weight: bold;
            color: black;
            font-size: larger;
        }

        .fixed-btn {
            border-color: black;
            border: 5px;
            border-radius: 10px;
            margin-left: 6rem;
            margin-top: 1rem;
            background-color: #e0efff;
            color: #5ba7ff;
        }
    </style>
</head>

<body>
    <header class="main-body">
        <div class="main-screen">
            <img class="small-img" src="./natureImg.jpg" alt="nature">
            <div class="main-section">
                <div>
                    <button class="btn">Nature</button>
                    <button class="btn">Lake</button>
                </div>

                <div class="h1-section">Lago di Braies</div>
                <p>Lorem ipsum dolor sit amet. consecteur adipiscing elit. Consecteur sodales morbi dignissim sed diam
                    pharetra vitae ipsun odio.</p>
                <button class="fixed-btn">Read More</button>
            </div>
        </div>
    </header>
</body>

</html>
